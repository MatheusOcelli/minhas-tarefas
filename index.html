<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matheus Ocelli — Página pessoal</title>
</head>
<body style="margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(145deg, #0f1419 0%, #1a2332 50%, #0d1117 100%); color: #f0f4f8; padding: 2rem; box-sizing: border-box;">
  <style>
    @keyframes fadeInDown {
      0% {
        opacity: 0;
        transform: translateY(-30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animated-title {
      animation: fadeInDown 1.1s cubic-bezier(0.27,0.74,0.36,1) both;
    }
    .contact-form input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }
    .contact-form input::placeholder {
      color: #64748b;
    }
  </style>
  <main style="max-width: 32rem; width: 100%; text-align: center;">
    <h1 class="animated-title" style="margin: 0 0 0.5rem; font-size: clamp(1.75rem, 5vw, 2.25rem); font-weight: 700; letter-spacing: -0.02em; color: #ffffff;">
      Matheus Ocelli
    </h1>
    <p style="margin: 0 0 2rem; font-size: 1.05rem; line-height: 1.6; color: #c8d4e0; border-left: 3px solid #3b82f6; padding-left: 1rem; text-align: left; display: inline-block; max-width: 100%;">
      Usando a IA para buscar minha liberdade financeira.
    </p>
    <h2 style="margin: 0 0 1rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #94a3b8;">
      Hobbies
    </h2>
    <ul style="margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 0.75rem; text-align: left;">
      <li style="background: rgba(255,255,255,0.06); border-radius: 10px; padding: 0.85rem 1.1rem; border: 1px solid rgba(255,255,255,0.08);">
        <span style="color: #60a5fa; margin-right: 0.5rem;">◆</span> Praticar esportes
      </li>
      <li style="background: rgba(255,255,255,0.06); border-radius: 10px; padding: 0.85rem 1.1rem; border: 1px solid rgba(255,255,255,0.08);">
        <span style="color: #60a5fa; margin-right: 0.5rem;">◆</span> Beber com os amigos
      </li>
      <li style="background: rgba(255,255,255,0.06); border-radius: 10px; padding: 0.85rem 1.1rem; border: 1px solid rgba(255,255,255,0.08);">
        <span style="color: #60a5fa; margin-right: 0.5rem;">◆</span> Viajar
      </li>
    </ul>

    <section style="margin-top: 2.5rem; text-align: left;">
      <h2 style="margin: 0 0 1rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #94a3b8; text-align: center;">
        Contato
      </h2>
      <form class="contact-form" action="#" method="post" style="display: flex; flex-direction: column; gap: 1rem;">
        <div style="background: rgba(255,255,255,0.06); border-radius: 10px; padding: 0.85rem 1.1rem; border: 1px solid rgba(255,255,255,0.08);">
          <label for="contato-nome" style="display: block; margin-bottom: 0.4rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8;">Nome</label>
          <input type="text" id="contato-nome" name="nome" required autocomplete="name" placeholder="Seu nome" style="width: 100%; box-sizing: border-box; padding: 0.65rem 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.25); color: #f0f4f8; font-size: 1rem; font-family: inherit;">
        </div>
        <div style="background: rgba(255,255,255,0.06); border-radius: 10px; padding: 0.85rem 1.1rem; border: 1px solid rgba(255,255,255,0.08);">
          <label for="contato-email" style="display: block; margin-bottom: 0.4rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8;">E-mail</label>
          <input type="email" id="contato-email" name="email" required autocomplete="email" placeholder="seu@email.com" style="width: 100%; box-sizing: border-box; padding: 0.65rem 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.25); color: #f0f4f8; font-size: 1rem; font-family: inherit;">
        </div>
        <button type="submit" style="margin-top: 0.25rem; padding: 0.85rem 1.25rem; border-radius: 10px; border: 1px solid rgba(59, 130, 246, 0.45); background: linear-gradient(180deg, rgba(59, 130, 246, 0.35) 0%, rgba(37, 99, 235, 0.25) 100%); color: #f0f4f8; font-size: 0.95rem; font-weight: 600; font-family: inherit; cursor: pointer;">
          Enviar
        </button>
      </form>
    </section>
  </main>
</body>
</html>
